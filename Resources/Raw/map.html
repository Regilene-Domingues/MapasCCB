<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CCB Mapas</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="controls.css" />
    <style>
        html, body, #map {
            height: 100%;
            margin: 0;
            padding: 0;
        }

        #map {
            width: 100%;
        }

        .church-marker {
            background: transparent;
            border: 0;
        }

        .church-pin {
            border: 2px solid #ffffff;
            border-radius: 50% 50% 50% 0;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.35);
            display: block;
            height: 22px;
            transform: rotate(-45deg);
            width: 22px;
        }

            .church-pin::after {
                background: #ffffff;
                border-radius: 50%;
                content: "";
                height: 8px;
                left: 7px;
                position: absolute;
                top: 7px;
                width: 8px;
            }

        .church-pin-blue {
            background: #2563eb;
        }

        .church-pin-green {
            background: #16a34a;
        }

        .church-pin-red {
            background: #dc2626;
        }

        .church-pin-gray {
            background: #6b7280;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        .locating {
            animation: pulse 1s infinite;
            background-color: #e0e0e0 !important;
        }
    </style>
</head>
<body>
  <div id="map"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    var map;
    var churchLayer;
    var selectedMarker = null;
    var searchCircle = null;
    var locateButton = null;
    var hasUserLocation = (typeof hasUserLocation !== 'undefined') ? hasUserLocation : false;
    var userMarker = null;
    var userAccuracyCircle = null;

    function initMap() {
      if (map || typeof L === 'undefined') {
        return;
      }

      var lat = (typeof initialLat !== 'undefined') ? initialLat : 39.5;
      var lon = (typeof initialLon !== 'undefined') ? initialLon : -8.0;
      var zoom = (typeof hasUserLocation !== 'undefined' && hasUserLocation) ? 15 : 6;

      map = L.map('map', { preferCanvas: true }).setView([lat, lon], zoom);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19,
        attribution: '© OpenStreetMap'
      }).addTo(map);

        churchLayer = L.layerGroup().addTo(map);
        map.addControl(addLocateControl());
        console.log('map initialized at: ' + lat + ', ' + lon);

        if (typeof hasUserLocation !== 'undefined' && hasUserLocation) {
          desenharPosicaoUsuario(lat, lon);
        }
    }

      function addLocateControl() {

          var LocateControl = L.Control.extend({

              options: {
                  position: 'topleft'
              },

              onAdd: function (map) {

                  // Container do controle
                  var container = L.DomUtil.create(
                      'div',
                      'leaflet-bar'
                  );

                  // Botão
                  locateButton = L.DomUtil.create(
                      'a',
                      'locate-control',
                      container
                  );

                  locateButton.href = "#";
                  locateButton.title = "Minha localização";
                  locateButton.setAttribute("role", "button");
                  locateButton.setAttribute("aria-label", "Minha localização");

                  locateButton.innerHTML = `
                        <svg viewBox="0 0 24 24">
                            <circle cx="12" cy="12" r="5"
                                    fill="none"
                                    stroke="#1976D2"
                                    stroke-width="2"/>

                            <circle cx="12" cy="12" r="2"
                                    fill="#1976D2"/>

                            <line x1="12" y1="1.5" x2="12" y2="5"
                                  stroke="#1976D2"
                                  stroke-width="2"
                                  stroke-linecap="round"/>

                            <line x1="12" y1="19" x2="12" y2="22.5"
                                  stroke="#1976D2"
                                  stroke-width="2"
                                  stroke-linecap="round"/>

                            <line x1="1.5" y1="12" x2="5" y2="12"
                                  stroke="#1976D2"
                                  stroke-width="2"
                                  stroke-linecap="round"/>

                            <line x1="19" y1="12" x2="22.5" y2="12"
                                  stroke="#1976D2"
                                  stroke-width="2"
                                  stroke-linecap="round"/>
                        </svg>`;

                  L.DomEvent.disableClickPropagation(container);

                  locateButton.onclick = function (e) {
                      L.DomEvent.preventDefault(e);
                      locateButton.classList.add('locating');
                      window.location.href = "https://app.local/pegarLocalizacao";
                  };

                  return container;
              }

          });

          return new LocateControl();
      }

    function decodeBase64Utf8(base64) {
      var binary = atob(base64);
      var bytes = new Uint8Array(binary.length);

      for (var i = 0; i < binary.length; i++) {
        bytes[i] = binary.charCodeAt(i);
      }

      return new TextDecoder('utf-8').decode(bytes);
    }

    function escapeHtml(value) {
      return String(value || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function buildGoogleMapsSearchUrl(lat, lon) {
      return 'https://www.google.com/maps/search/?api=1&query=' + lat + ',' + lon;
    }

    function buildWazeUrl(lat, lon) {
      return 'waze://?ll=' + lat + ',' + lon + '&navigate=yes';
    }

    function createChurchIcon(color) {
      return L.divIcon({
        className: 'church-marker',
        html: '<span class="church-pin church-pin-' + color + '"></span>',
        iconSize: [26, 26],
        iconAnchor: [13, 26],
        popupAnchor: [0, -26]
      });
    }

    function normalizeText(value) {
      return String(value || '')
        .toLowerCase()
        .normalize('NFD')
        .replace(/[\u0300-\u036f]/g, '');
    }

    function getTodayName() {
      var weekDays = [
        'domingo',
        'segunda-feira',
        'terca-feira',
        'quarta-feira',
        'quinta-feira',
        'sexta-feira',
        'sabado'
      ];

      return weekDays[new Date().getDay()];
    }

    function hasCultToday(church) {
      var agenda = church.Agenda || {};
      var today = getTodayName();
      var horarios = agenda.Horarios || {};

      if (Object.keys(horarios).some(function(dia) { return normalizeText(dia) === today; })) {
        return true;
      }

      return Array.isArray(agenda.DiasDeCulto) &&
        agenda.DiasDeCulto.some(function(dia) { return normalizeText(dia) === today; });
    }

    function setSelectedMarker(marker) {
      if (selectedMarker && selectedMarker !== marker) {
        selectedMarker.setIcon(selectedMarker.defaultIcon);
      }

      selectedMarker = marker;
      marker.setIcon(createChurchIcon('red'));
    }

    function formatPopup(church, lat, lon) {
      var agenda = church.Agenda || {};
      var horarios = agenda.Horarios || {};
      var cultos = Object.keys(horarios)
        .filter(function(dia) { return horarios[dia]; })
        .map(function(dia) { return escapeHtml(dia) + ': ' + escapeHtml(horarios[dia]); });

      if (cultos.length === 0 && Array.isArray(agenda.DiasDeCulto)) {
        cultos = agenda.DiasDeCulto.map(function(dia) { return escapeHtml(dia); });
      }

      var html = '<strong>' + escapeHtml(church.Nome) + '</strong><br />' +
        escapeHtml(church.Logradouro) + '<br />' +
        escapeHtml(church.Cidade) +
        (cultos.length > 0 ? '<br /><strong>Cultos:</strong><br />' + cultos.join('<br />') : '') +
        '<br /><a href="https://app.local/rota?lat=' + lat + '&lon=' + lon + '&nome=' + encodeURIComponent(church.Nome) + '">Como Chegar</a>';
      
      return html;
    }

    function clearSearchLocation() {
      if (searchCircle && map) {
        map.removeLayer(searchCircle);
        searchCircle = null;
      }

      return 'ok';
    }

    function centralizarNoUsuario(lat, lon) {
      if (!map) return;
      
      console.log('🚀 [PERF] Início execução JS: ' + new Date().getTime());
      
      // Remove animação visual se ativa
      if (locateButton) {
          locateButton.classList.remove('locating');
      }
      
      lat = Number(lat);
      lon = Number(lon);
      map.setView([lat, lon], 15, { animate: false });
      desenharPosicaoUsuario(lat, lon);
      return 'ok';
    }

    function desenharPosicaoUsuario(lat, lon) {
      if (!map) return;

      lat = Number(lat);
      lon = Number(lon);

      if (!Number.isFinite(lat) || !Number.isFinite(lon)) {
        return;
      }

      var point = [lat, lon];

      if (userMarker) {
        userMarker.setLatLng(point);
      } else {
        userMarker = L.marker(point, {
          icon: createChurchIcon('gray'),
          zIndexOffset: 1000
        }).addTo(map).bindPopup('<strong>Você está aqui</strong>');
      }

      if (userAccuracyCircle) {
        userAccuracyCircle.setLatLng(point);
      } else {
        userAccuracyCircle = L.circle(point, {
          color: '#6b7280',
          fillColor: '#9ca3af',
          fillOpacity: 0.15,
          radius: 100,
          weight: 1.5,
          dashArray: '4, 4'
        }).addTo(map);
      }
    }

    function setSearchLocation(lat, lon) {
      initMap();

      lat = Number(lat);
      lon = Number(lon);

      if (!map || !Number.isFinite(lat) || !Number.isFinite(lon)) {
        return 'invalid_location';
      }

      clearSearchLocation();

      var point = [lat, lon];
      searchCircle = L.circle(point, {
        color: '#dc2626',
        fillColor: '#dc2626',
        fillOpacity: 0.18,
        radius: 500,
        weight: 2
      }).addTo(map);

      map.setView(point, Math.max(map.getZoom(), 15));
      return 'ok';
    }
    function loadChurches(churches) {
      initMap();

      if (!map || !churchLayer || !Array.isArray(churches)) {
        console.error('invalid church payload');
        return;
      }

      churchLayer.clearLayers();
      var bounds = [];

      churches.forEach(function(church) {
        var coords = church.Coordenadas || {};

        if (coords.lat == null || coords.lon == null) {
          return;
        }

        var lat = Number(coords.lat);
        var lon = Number(coords.lon);

        if (!Number.isFinite(lat) || !Number.isFinite(lon)) {
          return;
        }

        var marker = L.marker([lat, lon], {
          icon: createChurchIcon(hasCultToday(church) ? 'green' : 'blue')
        }).addTo(churchLayer).bindPopup(formatPopup(church, lat, lon));

        marker.defaultIcon = marker.options.icon;
        marker.on('popupopen', function() {
          setSelectedMarker(marker);
        });
        marker.on('popupclose', function() {
          if (selectedMarker === marker) {
            marker.setIcon(marker.defaultIcon);
            selectedMarker = null;
          }
        });

        bounds.push([lat, lon]);
      });

      if (bounds.length > 0 && !hasUserLocation) {
        map.fitBounds(bounds, { padding: [24, 24] });
      }

      console.log('churches loaded: ' + bounds.length);
    }

    function loadChurchesBase64(base64) {
      try {
        loadChurches(JSON.parse(decodeBase64Utf8(base64)));
        return 'ok';
      } catch (e) {
        console.error('loadChurchesBase64 error', e);
        return 'error';
      }
    }

    function receiveDataFromMaui(base64) {
      return loadChurchesBase64(base64);
    }

    if (document.readyState === 'complete' || document.readyState === 'interactive') {
      setTimeout(initMap, 50);
    } else {
      window.addEventListener('DOMContentLoaded', initMap);
    }
  </script>
</body>
</html>
